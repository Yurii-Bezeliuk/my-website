<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link
         href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
         rel="stylesheet">
      <link
         href="https://fonts.googleapis.com/css2?family=Open%20Sans:wght@400;600;800&display=swap"
         rel="stylesheet">
      <link
         href="https://fonts.googleapis.com/css2?family=Open%20Sans:wght@700&display=swap"
         rel="stylesheet">
      <link rel="stylesheet" href="css/style.css">

      <title>LearnXpert</title>
   </head>
   <body>
      <div class="wrapper">
         <header class="header">
            <div class="header__container">
               <div class="header__logo logo-header">
                  <div class="logo-header--icon-logo"></div>
                  <div class="logo-header__text">LearnXpert</div>
               </div>
               <nav class="header__menu menu-header">
                  <ul class="menu-header__list">
                     <li class="menu-header__item"><a class="menu-header__link"
                           href="#">Home</a></li>
                     <li class="menu-header__item"><a class="menu-header__link"
                           href="#">About</a></li>
                     <li class="menu-header__item"><a class="menu-header__link"
                           href="#">Contact</a></li>
                     <li class="menu-header__item"><a class="menu-header__link"
                           href="#">Blog</a></li>
                  </ul>
               </nav>

               <div class="header__action">
                  <button class="header__action-btn">Sign up</button>
                  <button
                     class="header__action-menu menu-action"><span></span></button>

               </div>
            </div>

         </header>
         <main style="background-color: blue;"></main>
         <footer class="footer">
            <div class="footer-up up-footer">
               <div class="up-footer__container accordion">

                  <div class="up-footer__columns up-footer__columns--special">
                     <h5 class="up-footer__title">Get In
                        Touch</h5>
                     <div class="up-footer__text">
                        <p>the quick fox jumps over the
                           lazy dog</p>
                     </div>
                     <ul class=" up-footer__list--social">
                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link up-footer__link--icon-facebook"></a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link up-footer__link--icon-instagram"></a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link up-footer__link--icon-facebook"></a></li>

                     </ul>
                  </div>

                  <div class="up-footer__columns">
                     <h5 class="up-footer__title"><button
                           class="up-footer__button up-footer__button--icon-shevron"
                           tabindex="-1">Company
                           info</button></h5>

                     <ul class="up-footer__list">
                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">About Us</a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">Carrier</a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">We are hiring</a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">Blog</a></li>

                     </ul>
                  </div>

                  <div class="up-footer__columns">
                     <h5 class="up-footer__title"><button
                           class="up-footer__button up-footer__button--icon-shevron"
                           tabindex="-1">Features</button></h5>

                     <ul class="up-footer__list">
                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">Business
                              Marketing</a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">User Analytic</a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">Live Chat</a></li>

                        <li class="up-footer__item"><a href="#"
                              class="up-footer__link">Unlimited Support</a></li>

                     </ul>
                  </div>

               </div>
            </div>

            <div class="footer-down down-footer">
               <div class="down-footer__container">
                  <div class="down-footer__text">
                     <p>Made With Love By Figmaland All
                        Right Reserved </p>
                  </div>
               </div>
            </div>
         </footer>
      </div>
      <script src="js/script.js"></script>
   </body>
</html>
